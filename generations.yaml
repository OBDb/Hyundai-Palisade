generations:
  - name: "First Generation (Pre-Facelift)"
    start_year: 2018
    end_year: 2022
    description: "The Hyundai Palisade is the brand's flagship three-row SUV, introduced to replace the Santa Fe XL (formerly called the Santa Fe in three-row form). Built on a platform shared with the Kia Telluride, it features bold, upright styling with a massive cascading grille, vertical LED daytime running lights, and an imposing presence that signals its position at the top of Hyundai's SUV lineup. The Palisade debuted at the 2018 Los Angeles Auto Show on November 28, having been previewed by Hyundai's Grandmaster concept of June 2018. Measuring 4,980 mm long with a 2,900 mm wheelbase, it is Hyundai's largest passenger vehicle to date. Powered by a 3.8L V6 Lambda II GDi engine producing 295 PS and 36.2 kgm of torque, paired with an eight-speed automatic transmission and available with front-wheel or HTRAC all-wheel drive systems. The interior offers one of Hyundai's most premium efforts, with available features including a 10.25-inch touchscreen infotainment system, quilted Nappa leather seating, and ambient lighting. Seating configurations include eight-passenger (with a second-row bench) or seven-passenger (with second-row captain's chairs) layouts. Safety technology is comprehensive with Hyundai's SmartSense suite including forward collision avoidance, blind-spot collision avoidance, and Highway Driving Assist."

  - name: "First Generation (Facelift)"
    start_year: 2023
    end_year: 2025
    description: "The updated Palisade debuted for the North American market at the New York International Auto Show on April 13, 2022, for the 2023 model year. It features a revised front end with bolder styling and an enhanced infotainment system with 12-inch navigation. The thickness of the sound-absorbing material was increased and the shock-absorbing device was improved. In addition, technologies such as Digital Key 2 and second-row ventilation seats became an option. The facelift maintains the same 3.8L V6 engine producing 295 PS, but updates exterior styling with a more squared-off grille and redesigned headlights. The length increased slightly to 4,995 mm for the facelift model. Interior technology was enhanced with larger standard screens and added convenience features."

  - name: "Second Generation"
    start_year: 2024
    end_year: null
    description: "The second generation Palisade was unveiled on December 6, 2024. Built on an all-new platform (code LX3), it features a boxy exterior design with vertical rectangular LED headlights and a thin LED light strip across the upper grille. The wheelbase is longer at 2,970 mm compared to its predecessor's 2,900 mm. Inside, the 12.3-inch touchscreen infotainment and instrument cluster screens are housed within a wraparound dashboard design. The centre console is disconnected from the dashboard, providing additional storage space below with a wireless charger and 100W USB charging outlet. Powertrain options include a new 2.5L Smartstream G2.5 T-GDi inline-four producing 281 PS, a 3.5L Smartstream G3.5 V6 producing 291 PS, and a new hybrid powertrain combining the 2.5L turbo engine with electric motors producing 334 PS total output (paired with a 6-speed automatic). The V6 can tow 5,000 pounds while the hybrid can tow 4,000 pounds. For the first time, a 9-seater configuration is available with a front centre console that doubles as an additional seat. The XRT Pro trim offers improved off-road capability with 8.4 inches of ground clearance and front and rear recovery hooks."